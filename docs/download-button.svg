<svg xmlns="http://www.w3.org/2000/svg" width="188" height="52" viewBox="0 0 188 52" role="img" aria-label="Download">
  <title>Download</title>
  <defs>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d9dff"/>
      <stop offset="1" stop-color="#1668d6"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1668d6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="184" height="44" rx="22" fill="url(#fill)" filter="url(#lift)"/>

  <!-- Icône de téléchargement -->
  <g stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(48,16)">
    <path d="M9 0 v11"/>
    <path d="M4 7 l5 5 l5 -5"/>
    <path d="M1 17 h16"/>
  </g>

  <text x="78" y="30" fill="#ffffff" font-size="15" font-weight="600"
        font-family="'Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif">Download</text>
</svg>
